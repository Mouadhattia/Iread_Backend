name: Deploy iRead Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Ubuntu server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SERVER_USER: ${{ vars.SERVER_USER }}
          SERVER_IP: ${{ vars.SERVER_IP }}
          SERVER_PORT: ${{ vars.SERVER_PORT || '22' }}
          SERVER_PATH: ${{ vars.SERVER_PATH }}
        run: |
          set -euo pipefail

          if [ -z "${SSH_KEY:-}" ] || [ -z "${SERVER_USER:-}" ] || [ -z "${SERVER_IP:-}" ]; then
            echo "Missing SSH_KEY secret or SERVER_USER/SERVER_IP repository variables." >&2
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" | tr -d '\r' > ~/.ssh/iread_deploy_key
          chmod 600 ~/.ssh/iread_deploy_key

          ssh-keyscan -p "$SERVER_PORT" -H "$SERVER_IP" >> ~/.ssh/known_hosts

          remote_command="bash -s"
          if [ -n "${SERVER_PATH:-}" ]; then
            remote_command="SERVER_PATH=$(printf '%q' "$SERVER_PATH") bash -s"
          fi

          ssh -i ~/.ssh/iread_deploy_key \
            -p "$SERVER_PORT" \
            "$SERVER_USER@$SERVER_IP" \
            "$remote_command" <<'EOF'
          set -euo pipefail

          APP_DIR="${SERVER_PATH:-/var/www/html/iread/backend}"

          echo "Preparing iRead backend directory at $APP_DIR"
          mkdir -p "$APP_DIR"
          EOF

          rsync -az --delete \
            -e "ssh -i ~/.ssh/iread_deploy_key -p $SERVER_PORT" \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "venv/" \
            --exclude "uploads/" \
            --exclude "__pycache__/" \
            --exclude "*.pyc" \
            --exclude "*.log" \
            --exclude "*.sql" \
            --exclude ".env" \
            --exclude "config.py" \
            ./ "$SERVER_USER@$SERVER_IP:${SERVER_PATH:-/var/www/html/iread/backend}/"

          ssh -i ~/.ssh/iread_deploy_key \
            -p "$SERVER_PORT" \
            "$SERVER_USER@$SERVER_IP" \
            "$remote_command" <<'EOF'
          set -euo pipefail

          APP_DIR="${SERVER_PATH:-/var/www/html/iread/backend}"
          echo "Running iRead backend deploy commands in $APP_DIR"
          cd "$APP_DIR"

          if [ ! -d venv ]; then
            python3 -m venv venv
          fi

          . venv/bin/activate
          python --version
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt

          export FLASK_APP=app.py
          python -m flask db upgrade

          pm2 restart iread --update-env
          pm2 save
          EOF
