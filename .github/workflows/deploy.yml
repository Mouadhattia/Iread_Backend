name: Deploy iRead Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Ubuntu server
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SERVER_USER: ${{ vars.SERVER_USER }}
          SERVER_IP: ${{ vars.SERVER_IP }}
          SERVER_PORT: ${{ vars.SERVER_PORT || '22' }}
          SERVER_PATH: ${{ vars.SERVER_PATH }}
        run: |
          set -euo pipefail

          if [ -z "${SSH_KEY:-}" ] || [ -z "${SERVER_USER:-}" ] || [ -z "${SERVER_IP:-}" ]; then
            echo "Missing SSH_KEY secret or SERVER_USER/SERVER_IP repository variables." >&2
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" | tr -d '\r' > ~/.ssh/iread_deploy_key
          chmod 600 ~/.ssh/iread_deploy_key

          ssh-keyscan -p "$SERVER_PORT" -H "$SERVER_IP" >> ~/.ssh/known_hosts

          remote_command="bash -s"
          if [ -n "${SERVER_PATH:-}" ]; then
            remote_command="SERVER_PATH=$(printf '%q' "$SERVER_PATH") bash -s"
          fi

          ssh -i ~/.ssh/iread_deploy_key \
            -p "$SERVER_PORT" \
            "$SERVER_USER@$SERVER_IP" \
            "$remote_command" <<'EOF'
          set -euo pipefail

          APP_DIR="${SERVER_PATH:-/var/www/html/iread/backend}"
          BRANCH="main"

          echo "Deploying iRead backend from origin/$BRANCH in $APP_DIR"

          if [ ! -d "$APP_DIR/.git" ]; then
            echo "Remote project directory was not found or is not a git repository: $APP_DIR" >&2
            echo "Current directory details:" >&2
            ls -la "$APP_DIR" 2>/dev/null || true
            echo "Parent directory details:" >&2
            ls -la "$(dirname "$APP_DIR")" 2>/dev/null || true
            echo "Clone the repo there, or set the SERVER_PATH repository variable to the correct path." >&2
            exit 1
          fi

          cd "$APP_DIR"

          git fetch origin "$BRANCH"
          if git show-ref --verify --quiet "refs/heads/$BRANCH"; then
            git checkout "$BRANCH"
          else
            git checkout -b "$BRANCH" "origin/$BRANCH"
          fi
          git pull --ff-only origin "$BRANCH"

          if [ ! -d venv ]; then
            python3 -m venv venv
          fi

          . venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt

          export FLASK_APP=app.py
          python -m flask db upgrade

          pm2 restart iread --update-env
          pm2 save
          EOF
