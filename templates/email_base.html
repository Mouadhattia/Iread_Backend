<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>{% block email_title %}iRead{% endblock %}</title>
    <style>
      body, table, td, p, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
      body {
        margin: 0;
        padding: 0;
        width: 100% !important;
        background-color: #eef2f7;
        font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      .email-wrapper {
        width: 100%;
        background-color: #eef2f7;
        padding: 32px 16px;
      }
      .email-container {
        max-width: 560px;
        margin: 0 auto;
        background-color: #ffffff;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 2px 10px rgba(23, 32, 51, 0.06);
      }
      .email-header {
        padding: 28px 32px 20px;
        text-align: center;
        border-bottom: 1px solid #eef1f6;
      }
      .email-header img {
        max-width: 140px;
        height: auto;
      }
      .email-body {
        padding: 32px;
        color: #334155;
        font-size: 15px;
        line-height: 1.65;
      }
      .email-body h1 {
        margin: 0 0 16px;
        color: #172033;
        font-size: 22px;
        font-weight: 800;
      }
      .email-body p {
        margin: 0 0 16px;
        color: #475569;
      }
      .email-button {
        display: inline-block;
        padding: 12px 24px;
        background-color: #2364db;
        color: #ffffff !important;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 700;
        font-size: 15px;
      }
      .email-info-table {
        width: 100%;
        border-collapse: collapse;
        margin: 8px 0 20px;
      }
      .email-info-table td {
        padding: 8px 0;
        border-bottom: 1px solid #eef1f6;
        font-size: 14px;
        color: #475569;
        vertical-align: top;
      }
      .email-info-table td.label {
        width: 110px;
        color: #94a3b8;
        font-weight: 700;
      }
      .email-footer {
        padding: 24px 32px;
        background-color: #f8fafc;
        text-align: center;
      }
      .email-footer p {
        margin: 0 0 6px;
        color: #94a3b8;
        font-size: 12.5px;
        line-height: 1.6;
      }
      .email-footer a {
        color: #2364db;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="email-wrapper">
      <div class="email-container">
        <div class="email-header">
          <img src="https://iread.education/brand/logo.png" alt="iRead" />
        </div>
        <div class="email-body">
          {% block content %}{% endblock %}
        </div>
        <div class="email-footer">
          <p>iRead &mdash; CEFR-aligned English reading for EFL/ESL schools</p>
          <p><a href="https://iread.education">iread.education</a></p>
          <p>&copy; {{ current_year|default(2026) }} iRead. All rights reserved.</p>
        </div>
      </div>
    </div>
  </body>
</html>
